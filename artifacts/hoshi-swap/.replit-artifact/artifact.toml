kind = "web"
previewPath = "/"
title = "HOSHI Swap"
version = "1.0.0"
id = "artifacts/hoshi-swap"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24614

[services.development]
run = "pnpm --filter @workspace/hoshi-swap run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hoshi-swap", "run", "build" ]
publicDir = "artifacts/hoshi-swap/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24614"
BASE_PATH = "/"
